  :root { --bg: #f8fafc; --text: #1e293b; --text2: #64748b; --accent: #3b82f6; --card: #ffffff; --border: #e2e8f0; }
  * { margin:0; padding:0; box-sizing:border-box; }

  h2 { font-size: 15px; font-weight: 700; color: var(--text); margin: 24px 0 8px; }

  .footer { text-align: center; padding: 32px 24px; font-size: 12px; color: var(--text2); }
  .footer a { color: var(--text2); text-decoration: none; margin: 0 8px; }
  .footer a:hover { color: var(--accent); }
  @media (max-width: 640px) { .container { padding: 32px 16px; } .card { padding: 24px 20px; } }
