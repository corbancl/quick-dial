<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>账户管理 · 呲啦起始/title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  :root { --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; --text: #1e293b; --text2: #64748b; --accent: #3b82f6; --shadow: 0 1px 3px rgba(0,0,0,0.04); --green: #22c55e; --red: #ef4444; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; min-height: 100vh; }
  .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(248,250,252,0.92); border-bottom: 1px solid var(--border); }
  .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; height: 56px; }
  .nav-logo { font-size: 11px; font-weight: 600; text-decoration: none; color: var(--text2); line-height: 1.15; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
  .nav-logo-img { width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0; }
  .nav-logo-txt { line-height: 1.15; }
  .nav-logo .sub { display: block; font-size: 17px; font-weight: 800; color: var(--accent); }
  .nav-links { display: flex; gap: 24px; align-items: center; }
  .nav-links a { color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 500; transition: color 0.2s; }
  .nav-links a:hover { color: var(--text); }
  .nav-btn { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; background: var(--accent); color: white; }
  .nav-btn:hover { opacity: 0.9; }
  .nav-lang { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 16px; cursor: pointer; color: var(--text2); transition: all 0.2s; }
  .nav-lang:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .container { max-width: 520px; margin: 0 auto; padding: 120px 24px 60px; }
  .block { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; margin-bottom: 16px; }
  h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-label { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; color: white; font-weight: 700; }
  .badge-green { background: var(--green); }
  .form-input { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; }
  .form-input:focus { border-color: var(--accent); }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, var(--accent),#2563eb); color: white; width: 100%; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { background: rgba(255,255,255,0.05); }
  .btn-sm { padding: 8px 16px; font-size: 13px; border-radius: 8px; width: auto; }
  .btn-red { background: var(--red); color: white; }
  .flex-row { display: flex; gap: 8px; }
  .flex-row .form-input { flex: 1; }
  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .info-label { opacity: 0.5; }
  .info-value { font-weight: 600; }
  .spacer { height: 12px; }
  .msg { font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; }
  .msg-success { background: rgba(34,197,94,0.1); color: var(--green); }
  .msg-error { background: rgba(239,68,68,0.08); color: var(--red); }
  .msg-info { background: rgba(59,130,246,0.08); color: var(--accent); }

  /* Login page */
  .login-card { text-align: center; }
  .login-card h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
  .login-card p { font-size: 14px; color: var(--text2); margin-bottom: 24px; }
  .modal-tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .modal-tab { flex: 1; padding: 8px 0; font-size: 13px; font-weight: 600; color: var(--text2); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; }
  .modal-tab.active { color: var(--text); border-bottom-color: var(--accent); }

  /* Footer */
  .footer {
    text-align: center;
    padding: 48px 24px 32px;
    font-size: 13px;
    color: var(--text2);
    border-top: 1px solid var(--border);
  }
  .footer .footer-links {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 4px 20px;
    margin-bottom: 14px;
  }
  .footer .footer-links a {
    color: var(--accent);
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .footer .footer-links a:hover {
    opacity: 0.75;
    text-decoration: underline;
  }
  .footer .footer-filings {
    font-size: 12px;
    line-height: 2;
    color: var(--text2);
    opacity: 0.75;
  }
  .footer .footer-filings a {
    color: var(--text2);
    text-decoration: none;
  }
  .footer .footer-filings a:hover {
    color: var(--accent);
  }
  .footer .footer-sep {
    display: inline-block;
    margin: 0 10px;
    color: var(--border);
  }
  #toast { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 9999; padding: 14px 28px; border-radius: 12px; font-size: 14px; font-weight: 600; color: white; pointer-events: none; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  @media (max-width: 768px) { .container { padding: 100px 16px 40px; } .nav-links a { display: none; } }
  @media (max-width: 640px) {
    .footer { padding: 32px 16px 24px; font-size: 12px; }
    .footer .footer-links { gap: 2px 14px; }
  }
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="./" class="nav-logo"><img src="favicon.png" class="nav-logo-img" alt="" /><span class="nav-logo-txt">Quick Dial<span class="sub">呲啦起始/span></span></a>
    <div class="nav-links">
      <a href="./#features">功能</a>
      <a href="./#pricing">价格</a>
      <a href="./#download">下载</a>
      <a href="./#faq">常见问题</a>
      <button class="nav-btn" id="nav-action" onclick="handleNavAction()">登录</button>
      <button class="nav-lang" onclick="qdToggleLang()" title="English">🌐</button>
    </div>
  </div>
</nav>

<div class="container" id="app">
  <!-- 未登-->
  <div id="login-view">
    <div class="block login-card">
      <h1>账户管理</h1>
      <p>登录以管理你Quick Dial 账户</p>
      <div class="modal-tabs" id="login-tabs">
        <button class="modal-tab active" onclick="switchTab('login')">登录</button>
        <button class="modal-tab" onclick="switchTab('register')">注册</button>
        <button class="modal-tab" onclick="switchTab('reset')">找回密码</button>
      </div>
      <div id="login-form">
        <div class="form-group"><input class="form-input" id="auth-user" placeholder="用户 /></div>
        <div class="form-group"><input class="form-input" id="auth-pass" type="password" placeholder="密码" /></div>
        <button class="btn btn-primary" onclick="handleLogin()">登录</button>
      </div>
      <div id="register-form" style="display:none">
        <div class="form-group"><input class="form-input" id="reg-user" placeholder="用户名（至少2个字符）" /></div>
        <div class="form-group"><input class="form-input" id="reg-pass" type="password" placeholder="密码（至位）" /></div>
        <button class="btn btn-primary" onclick="handleRegister()">注册</button>
      </div>
      <div id="reset-form" style="display:none">
        <div class="form-group"><input class="form-input" id="reset-user" placeholder="输入用户 /></div>
        <button class="btn btn-primary" onclick="sendResetCode()">发送验证码到绑定邮/button>
        <div class="spacer"></div>
        <div class="form-group"><input class="form-input" id="reset-code" placeholder="6位验证码" /></div>
        <div class="form-group"><input class="form-input" id="reset-new-pass" type="password" placeholder="新密码（至少6位）" /></div>
        <button class="btn btn-primary" onclick="handleResetPassword()">重置密码</button>
      </div>
      <div id="login-msg"></div>
    </div>
  </div>

  <!-- 已登-->
  <div id="account-view" style="display:none">
    <div class="block">
      <h2>个人信息</h2>
      <div class="info-row"><span class="info-label">用户/span><span class="info-value" id="info-user">-</span></div>
      <div class="info-row"><span class="info-label">邮箱</span><span class="info-value" id="info-email">未绑/span></div>
      <div class="info-row"><span class="info-label">订阅</span><span class="info-value" id="info-sub">免费</span></div>
    </div>

    <div class="block">
      <h2>绑定邮箱</h2>
      <p style="font-size:13px;opacity:0.5;margin-bottom:12px;">用于找回密码和接收通知</p>
      <div class="form-group"><input class="form-input" id="bind-email" type="email" placeholder="your@email.com" /></div>
      <button class="btn btn-outline btn-sm" id="send-code-btn" onclick="sendBindCode()" style="width:100%">发送验证码</button>
      <div class="form-group" style="margin-top:12px;display:none" id="code-group">
        <input class="form-input" id="bind-code" placeholder="输入6位验证码" maxlength="6" />
      </div>
      <button class="btn btn-primary btn-sm" id="verify-btn" onclick="verifyBindEmail()" style="width:100%;display:none">验证绑定</button>
      <div id="email-msg"></div>
    </div>

    <div class="block">
      <h2>修改密码</h2>
      <div class="form-group"><input class="form-input" id="change-old" type="password" placeholder="当前密码" /></div>
      <div class="form-group"><input class="form-input" id="change-new" type="password" placeholder="新密码（至少6位）" /></div>
      <button class="btn btn-primary" onclick="changePassword()">修改密码</button>
      <div id="pwd-msg"></div>
    </div>

    <div class="block">
      <h2>订阅管理</h2>
      <p style="font-size:13px;opacity:0.5;margin-bottom:12px;">Pro 解锁云同步、无限分组、自定义CSS 等全部功/p>
      <button class="btn btn-primary" onclick="openPro()">使用扩展开续费 Pro</button>
    </div>

    <div class="block">
      <button class="btn btn-outline" onclick="handleLogout()" style="width:100%">退出登/button>
    </div>
  </div>
</div>

<div class="footer">
  <div class="footer-links">
    <a href="about.html">关于我们</a>
    <a href="privacy.html">隐私政策</a>
    <a href="copyright.html">版权声明</a>
    <a href="contact.html">联系方式</a>
    <a href="guide.html">使用指南</a>
  </div>
  <div class="footer-filings">
    &copy;2026 cilacila.cn 呲啦起始版权所br>
    <a href="https://beian.miit.gov.cn" target="_blank" rel="noopener">鲁ICP701203023</a>
    <span class="footer-sep">|</span>
    <img src="beian.png" alt="" style="width:14px;height:14px;vertical-align:middle;margin-right:2px;"><a href="https://beian.mps.gov.cn/#/query/webSearch?code=37098202000884" target="_blank" rel="noopener">鲁公网安7098202000884/a>
  </div>
</div>
<div id="toast"></div>

<script>
const API = 'https://sync.ruseo.cn/api/account.php';
const SYNC_API = 'https://sync.ruseo.cn/api/sync.php';
let token = localStorage.getItem('qd-website-token') || '';
let currentTab = 'login';

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  el.style.background = ({success:'linear-gradient(135deg,#22c55e,#16a34a)',error:'linear-gradient(135deg,#ef4444,#dc2626)',info:'linear-gradient(135deg,#3b82f6,#2563eb)'})[type];
  setTimeout(() => el.style.display = 'none', 2500);
}

function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('.modal-tab').forEach((b,i) => b.className = 'modal-tab' + (['login','register','reset'][i]===t?' active':''));
  document.getElementById('login-form').style.display = t==='login'?'':'none';
  document.getElementById('register-form').style.display = t==='register'?'':'none';
  document.getElementById('reset-form').style.display = t==='reset'?'':'none';
  document.getElementById('login-msg').innerHTML = '';
}

function setMsg(id, msg, type) { document.getElementById(id).innerHTML = msg ? `<div class="msg msg-${type}">${msg}</div>` : ''; }

function showView(name) {
  document.getElementById('login-view').style.display = name==='login'?'':'none';
  document.getElementById('account-view').style.display = name==='account'?'':'none';
  document.getElementById('nav-action').textContent = name==='account'?'退:'登录';
}

function handleNavAction() {
  if (token) { handleLogout(); }
  else { showView('login'); switchTab('login'); }
}

async function api(url, body) {
  const h = { 'Content-Type': 'application/json' };
  if (token) h['Authorization'] = 'Bearer ' + token;
  const r = await fetch(url, { method: 'POST', headers: h, body: JSON.stringify(body) });
  return r.json();
}

async function handleLogin() {
  const u = document.getElementById('auth-user').value.trim();
  const p = document.getElementById('auth-pass').value;
  if (!u || !p) { setMsg('login-msg','请填写用户名和密,'error'); return; }
  const r = await fetch(SYNC_API+'?action=login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
  const d = await r.json();
  if (d.code === 200) {
    token = d.data.token; localStorage.setItem('qd-website-token', token);
    toast('登录成功', 'success'); loadAccount(); showView('account');
  } else { setMsg('login-msg', d.msg, 'error'); }
}

async function handleRegister() {
  const u = document.getElementById('reg-user').value.trim();
  const p = document.getElementById('reg-pass').value;
  if (p.length < 6) { setMsg('login-msg','密码至少6,'error'); return; }
  const r = await fetch(SYNC_API+'?action=register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
  const d = await r.json();
  if (d.code === 200) {
    token = d.data.token; localStorage.setItem('qd-website-token', token);
    toast('注册成功', 'success'); loadAccount(); showView('account');
  } else { setMsg('login-msg', d.msg, 'error'); }
}

async function sendResetCode() {
  const u = document.getElementById('reset-user').value.trim();
  if (!u) { setMsg('login-msg','请输入用户名','error'); return; }
  const d = await api(API+'?action=send_reset_code', { username: u });
  setMsg('login-msg', d.msg, d.code===200?'info':'error');
}

async function handleResetPassword() {
  const u = document.getElementById('reset-user').value.trim();
  const c = document.getElementById('reset-code').value.trim();
  const p = document.getElementById('reset-new-pass').value;
  if (p.length < 6) { setMsg('login-msg','新密码至,'error'); return; }
  const d = await api(API+'?action=reset_password', { username:u, code:c, new_password:p });
  if (d.code === 200) { toast('密码已重,'success'); switchTab('login'); setMsg('login-msg',''); }
  else { setMsg('login-msg', d.msg, 'error'); }
}

async function loadAccount() {
  try {
    const r = await fetch(API+'?action=profile', { headers: {'Authorization':'Bearer '+token} });
    const d = await r.json();
    if (d.code === 200 && d.data) {
      document.getElementById('info-user').textContent = d.data.username;
      document.getElementById('info-email').innerHTML = d.data.email ? d.data.email + ' <span class="badge badge-green">已验/span>' : '未绑;
      const s = d.data.subscription;
      if (s && s.plan && s.plan !== 'free') {
        document.getElementById('info-sub').innerHTML = ({monthly:'月度',yearly:'年度',lifetime:'终身'})[s.plan] + ' <span style="color:#22c55e;font-size:12px;">Pro</span>';
        if (s.expire_at) document.getElementById('info-sub').innerHTML += ' <span style="font-size:11px;opacity:0.5;">'+s.expire_at.slice(0,10)+'</span>';
      }
    }
  } catch(e) { /* API 未部署时静默 */ }
}

async function sendBindCode() {
  const email = document.getElementById('bind-email').value.trim();
  if (!email) { setMsg('email-msg','请输入邮,'error'); return; }
  const btn = document.getElementById('send-code-btn');
  btn.disabled = true; btn.textContent = '发送中...';
  const d = await api(API+'?action=send_bind_code', { email, lang:'zh' });
  btn.disabled = false; btn.textContent = '重新发;
  if (d.code === 200) {
    setMsg('email-msg', d.msg, 'success');
    document.getElementById('code-group').style.display = '';
    document.getElementById('verify-btn').style.display = '';
    document.getElementById('bind-code').focus();
  } else {
    setMsg('email-msg', d.msg, 'error');
  }
}

async function verifyBindEmail() {
  const code = document.getElementById('bind-code').value.trim();
  if (!code || code.length !== 6) { setMsg('email-msg','请输位验证码','error'); return; }
  const btn = document.getElementById('verify-btn');
  btn.disabled = true; btn.textContent = '验证..';
  const d = await api(API+'?action=verify_bind_email', { code });
  btn.disabled = false; btn.textContent = '验证绑定';
  setMsg('email-msg', d.msg, d.code===200?'success':'error');
  if (d.code === 200) {
    loadAccount();
    document.getElementById('bind-email').value = '';
    document.getElementById('bind-code').value = '';
    document.getElementById('code-group').style.display = 'none';
    document.getElementById('verify-btn').style.display = 'none';
    document.getElementById('send-code-btn').textContent = '发送验证码';
  }
}

async function changePassword() {
  const old = document.getElementById('change-old').value;
  const nw = document.getElementById('change-new').value;
  if (nw.length < 6) { setMsg('pwd-msg','新密码至,'error'); return; }
  const d = await api(API+'?action=change_password', { old_password:old, new_password:nw });
  setMsg('pwd-msg', d.msg, d.code===200?'success':'error');
}

function openPro() { toast('请安Quick Dial 扩展后在设置中开Pro','info'); }

function handleLogout() {
  token = ''; localStorage.removeItem('qd-website-token');
  toast('已退, 'info'); showView('login'); switchTab('login');
}

// Init
if (token) { loadAccount(); showView('account'); }
else { showView('login'); }
</script>
<script src="lang.js"></script>
<script src=theme.js></script></body>
</html>
