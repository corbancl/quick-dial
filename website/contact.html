<style>
  :root { --bg: #06080d; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.06); --text: #e2e8f0; --text2: rgba(226,232,240,0.5); --accent: #3b82f6; --accent2: #8b5cf6; --accent3: #06b6d4; --green: #22c55e; --red: #ef4444; --radius: 16px; --radius-sm: 10px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.7; min-height: 100vh; position: relative; }
  body::before { content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(circle at 20% 20%, rgba(59,130,246,0.08) 0%, transparent 50%), radial-gradient(circle at 80% 60%, rgba(139,92,246,0.06) 0%, transparent 50%), radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 100% 100%, 100% 100%, 24px 24px; mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%); }
  .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(6,8,13,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
  .nav-inner { max-width: 1140px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo-img { width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0; }
  .nav-logo .brand { font-size: 16px; font-weight: 800; color: var(--text); line-height: 1.2; }
  .nav-logo .cn { font-size: 10px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .nav-links { display: flex; gap: 24px; align-items: center; }
  .nav-links a { color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 500; transition: color 0.2s; }
  .nav-links a:hover { color: var(--text); }
  .nav-btn { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; background: linear-gradient(135deg, var(--accent), #2563eb); color: white; }
  .nav-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(59,130,246,0.3); }
  .nav-lang { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 16px; cursor: pointer; color: var(--text2); transition: all 0.2s; }
  .nav-lang:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .container { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 120px 24px 60px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px 36px; backdrop-filter: blur(8px); }
  h1 { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
  h2 { font-size: 16px; font-weight: 700; margin: 28px 0 10px; color: var(--accent); }
  p { font-size: 14px; color: var(--text2); line-height: 1.9; margin-bottom: 8px; }
  .back { display: inline-block; margin-top: 32px; font-size: 13px; color: var(--accent); text-decoration: none; font-weight: 600; transition: opacity 0.2s; }
  .back:hover { opacity: 0.8; }
  .footer { position: relative; z-index: 1; text-align: center; padding: 48px 24px 32px; font-size: 13px; color: var(--text2); border-top: 1px solid var(--border); }
  .footer .footer-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 4px 20px; margin-bottom: 14px; }
  .footer .footer-links a { color: var(--accent); text-decoration: none; transition: opacity 0.2s; }
  .footer .footer-links a:hover { opacity: 0.75; text-decoration: underline; }
  .footer .footer-filings { font-size: 12px; line-height: 2; color: var(--text2); opacity: 0.75; }
  .footer .footer-filings a { color: var(--text2); text-decoration: none; }
  .footer .footer-filings a:hover { color: var(--accent); }
  .footer .footer-sep { display: inline-block; margin: 0 10px; color: var(--border); }
  @media (max-width: 768px) { .container { padding: 100px 16px 40px; } .card { padding: 28px 20px; } .nav-links a { display: none; } }
  @media (max-width: 640px) { .footer { padding: 32px 16px 24px; font-size: 12px; } .footer .footer-links { gap: 2px 14px; } }
