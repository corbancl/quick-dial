  .nav-lang { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 16px; cursor: pointer; color: var(--text2); transition: all 0.2s; }

  .container { max-width: 720px; margin: 0 auto; padding: 120px 24px 60px; }

  .footer .footer-links a {
    color: var(--accent);
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .footer .footer-links a:hover {
    opacity: 0.75;
    text-decoration: underline;
  }
  .footer .footer-filings {

  .footer .footer-filings a {

  .footer .footer-filings a:hover {

    <h2>Our Mission</h2>
    <p>Quick Dial is a minimalist browser new tab tool designed for desktop users, dedicated to providing a clean, ad-free, and efficient browser start page experience. We offer quick multi-engine search, frequently used website navigation, practical online tools, and lightweight desktop widgets no popups, no harassment, no forced push notifications. Everything is designed to enhance your browsing efficiency.</p>
    <h2>Service Policy</h2>
    <p>All features on this site are free public utility tools. We do not collect private user data, force redirects, bundle software, induce clicks, or hijack traffic. All search actions redirect to official search engine result pages, providing only a convenient entry point without participating in or modifying any search content.</p>
    <h2>Our Philosophy</h2>
    <p>We reject cluttered information feeds, popups, and advertising content. We adhere to a minimalist, clean, and efficient product design to provide a pure browser start page experience for all users.</p>
