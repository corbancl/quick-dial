    <h1>Privacy Policy</h1>
    <div class="date">Last Updated: June 4, 2026</div>
    <p>Quick Dial (cilacila.cn) highly values user privacy protection. This Privacy Policy explains our information collection, usage, and protection practices.</p>
    <h2>1. Information Collection</h2>
    <p>We do not actively collect, store, or upload any personal privacy information, including but not limited to phone numbers, account passwords, geolocation, browsing history, or device information. To optimize site access experience and track site traffic, we only obtain anonymous aggregated site visit data through standard analytics tools (used solely for site optimization and user behavior analysis). All data is anonymous and aggregated, and cannot be traced to individual users.</p>
    <h2>2. Search Data</h2>
    <p>Our search functionality only provides a redirect entry point. All user search behavior, search content, and search results are completed on third-party official search engine pages. We do not save, capture, or record user search keywords or browsing history.</p>
    <h2>3. Cookie Usage</h2>
    <p>We only use minimal local Cookies to save user personalization settings (such as theme colors, search engine preferences, and widget toggle settings). All Cookies are stored only in the user's local browser, are not uploaded to servers, and do not collect any private information.</p>
    <h2>4. Third-Party Services</h2>
    <p>Some features rely on legitimate third-party public services (search engines, weather APIs, site analytics). All third-party services comply with their respective platform privacy rules. We strictly screen compliant third-party interfaces to ensure user access security.</p>
    <h2>5. User Rights</h2>
    <p>Users may at any time clear local cache, Cookies, and local configuration data from this site through their browser settings, maintaining full control over personal browsing data.</p>
    <h2>6. Policy Updates</h2>
    <p>We may update this Privacy Policy as needed for operational purposes. Updates will be publicly posted on this page and take effect upon posting.</p>
