  <!-- 搜索 -->
  <img src="imgs/main.png" class="overview-img" alt="搜索功能" style="margin-top:12px" /><h2 id="search">🔍 搜索功能</h2>
  <p>呲啦起始页顶部搜索框支持 <strong>一键切换搜索引/strong>，默认支持：</p>
  <div class="feature-grid">
    <div class="feature-item"><div class="icon">🌐</div><h4>6 种免费引/h4><p>Google · 百度 · Bing · 搜狗 · 360 搜索 · 淘宝</p></div>
    <div class="feature-item"><div class="icon">/div><h4>Pro 专属引擎<span class="pro-badge">PRO</span></h4><p>知乎 · 微博 · B· GitHub · DuckDuckGo · X · YouTube</p></div>
    <div class="feature-item"><div class="icon">/div><h4>自定义引span class="pro-badge">PRO</span></h4><p>添加任意搜索引擎，用 {keyword} 占位查询参数</p></div>
    <div class="feature-item"><div class="icon">⌨️</div><h4>快捷键聚/h4><p><span class="kbd">Ctrl+K</span> <span class="kbd">/</span> 快速跳到搜索框</p></div>
  </div>

  <h3>怎么切换搜索引擎/h3>
  <ul>
    <li>点击搜索框左侧的搜索引擎名称（如「百度」）</li>
    <li>在下拉菜单中点击想要的引擎即可切/li>
    <li>Pro 用户可点击 添加自定义引擎」输入名称和搜索 URL</li>
  </ul>

  <!-- 导航管理 -->
  <h2 id="dials">📌 导航管理</h2>
  <p>页面核心区域<strong>快捷导航卡片</strong>，可自定义排列你最常用的网站/p>

  <h3>添加导航</h3>
  <ul>
    <li>点击右下<strong>+ 按钮</strong>（或工具栏中导入导出 导入浏览器书签）</li>
    <li>粘贴网址，系统自动识别网站名称和图标</li>
    <li>可在 7 大分类（常用/社交/开媒体/办公/学习/品牌）中选择图标，共 60+ emoji + 18 个品牌图/li>
    <li>支持自定义图URL（展开高级选项/li>
  </ul>

  <h3>分组管理</h3>
  <ul>
    <li>免费版最多创<strong>3 个分/strong>，Pro 版无限制</li>
    <li>右键导航卡片 编辑 选择分组进行归类</li>
    <li>拖拽卡片，悬停在分组名上可跨分组移动</li>
    <li>在分组管理面板中可排序、重命名、删除分/li>
  </ul>

  <h3>拖拽排序与右键菜/h3>
  <ul>
    <li>长按导航卡片直接拖拽，调整排列顺/li>
    <li>右键卡片弹出菜单，可编辑或删/li>
    <li>选中卡片后按 <span class="kbd">Delete</span> 删除，按 <span class="kbd">E</span> 编辑</li>
  </ul>

  <h3>导入浏览器书/h3>
  <ul>
    <li>打开「导导出」面板，点击「导入浏览器书签/li>
    <li>选择Chrome/Edge 导出HTML 书签文件</li>
    <li>自动按文件夹分组，已存在的不重复导入</li>
    <li>免费版超3 个文件夹的书签自动归入「默认收藏/li>
  </ul>

  <!-- 时钟 -->

    <div class="feature-item"><div class="icon">💻</div><h4>二进制时/h4><p>6 位二进制圆点 + 十进制对/p></div>
  </div>

  <!-- 天气 -->
  <h2 id="weather">🌤天气与农/h2>
  <p>自动根据 IP 定位显示本地天气和农历信息/p>

  <h3>天气功能</h3>
  <ul>
    <li>实时显示：温度、天气描述、湿度、风向风/li>
    <li>点击天气卡片可展开 <strong>3 日天气预/strong>（今明天/后天/li>
    <li>15 分钟自动刷新，确保数据准/li>
  </ul>

  <ul>
    <li>显示农历日期、干支纪年、生/li>

    <li>节日/假日用红色高亮标/li>
    <li>点击农历卡片可展开 <strong>黄历宜忌</strong> + 财神/喜神/福神方位</li>
  </ul>

  <ul>
    <li><strong>本地上传</strong>：选择本地图片文件，最5MB</li>

  <!-- 数据 -->
  <img src="imgs/importexport.png" class="overview-img" alt="导入导出" style="margin-top:12px" /><h2 id="data">💾 数据备份</h2>
  <h3>导出备份</h3>
  <ul>
    <li>工具导入/导出 导出备份</li>
    <li>生成 JSON 文件（含导航、分组、设置、壁纸、最近访问）</li>
    <li>文件名格式：<code>speed-dial-backup-2026-06-05.json</code></li>
  </ul>

  <h3>导入恢复</h3>
  <ul>
    <li>选择之前导出JSON 备份文件，一键恢复所有数/li>
    <li>系统自动验证文件格式，无效文件会提示</li>
  </ul>

  <h3>清空数据</h3>
  <ul>
    <li>工具导入/导出 清空所有数据（需要确认）</li>
    <li>此操作不可恢复，建议先导出备/li>
  </ul>

  <!-- 云同-->
  <img src="imgs/sync.png" class="overview-img" alt="云同 style="margin-top:12px" /><h2 id="sync">☁️ 云同<span class="pro-badge">PRO</span></h2>
  <p>更换设备或重装浏览器后，快速恢复你的起始页配置/p>
  <ul>
    <li><strong>注册/登录</strong>：用户名至少 2 个字符，密码至少 6 /li>
    <li><strong>上传到云/strong>：点击上传按钮，数据加密传输到服务器</li>
    <li><strong>从云端下/strong>：在新设备登录后点击下载 秒后自动刷新</li>
    <li><strong>版本冲突</strong>：云端版本更新时自动下载合并，不丢数/li>
    <li>同步内容：导航、分组、壁纸、设置、自定义 CSS、自定义标题、自定义底部</li>
  </ul>
